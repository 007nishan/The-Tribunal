<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Tribunal - Quality Taskforce Wing</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header>
    <div class="brand">The Tribunal</div>
    {% if current_user %}
    <div class="nav-user">
        <span class="role-badge">{{ current_user.role }}</span>
        <span>{{ current_user.username }}</span>
        <a href="{{ url_for('login') }}" class="btn btn-outline" style="padding: 0.25rem 0.5rem;">Switch Role</a>
    </div>
    {% endif %}
</header>

<div class="container">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="card" style="background:#D1FAE5; color:#065F46; border:none; padding:1rem; margin-bottom:1rem;">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</div>

</body>
</html>
