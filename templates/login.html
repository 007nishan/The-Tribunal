{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 4rem auto;">
    <h2>Mock Authentication</h2>
    <p style="color: var(--text-muted); font-size: 0.875rem;">Select a role role to proceed as. This is a temporary login system for demonstration.</p>
    
    <div style="display: flex; flex-direction: column; gap: 0.5rem; margin-top: 1.5rem;">
        {% for u in users %}
        <a href="{{ url_for('dashboard', user_id=u.id) }}" class="btn btn-outline" style="justify-content: flex-start; text-align: left;">
            <span style="width: 100px; display: inline-block; font-weight: 600;">{{ u.role }}</span>
            <span style="color: var(--text-muted);">{{ u.username }}</span>
        </a>
        {% endfor %}
    </div>
</div>
{% endblock %}
